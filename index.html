<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js"
        integrity="sha512-b+nQTCdtTBIRIbraqNEwsjB6UvL3UEMkXnhzd8awtCYh0Kcsjl9uEgwVFVbhoj3uu1DO1ZMacNvLoyJJiNfcvg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>

    <div class="background-overlay"></div>

    <div class="login-container">
        <div class="login-box">

            <div class="login-header">
                <h2>Welcome Rail Agent</h2>
                <p>Enter Below Details To Login</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" />


                        <i id="eyeOpen" class="fa-solid fa-eye toggle-password" onclick="togglePassword()"
                            style="display: none;"></i>


                        <i id="eyeClosed" class="fa-solid fa-eye-slash toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>

                <button type="submit">Login</button>
            </form>



            <div class="forgot-link">
                <a href="#">Forgot Password?</a>
            </div>
        </div>
    </div>


    <script>
        function togglePassword() {
            const passwordInput = document.getElementById("password");
            const eyeOpen = document.getElementById("eyeOpen");
            const eyeClosed = document.getElementById("eyeClosed");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeOpen.style.display = "inline";
                eyeClosed.style.display = "none";
            } else {
                passwordInput.type = "password";
                eyeOpen.style.display = "none";
                eyeClosed.style.display = "inline";
            }
        }
    </script>




</body>

</html>
